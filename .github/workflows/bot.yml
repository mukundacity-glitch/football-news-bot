name: FPL Vortex Bot

on:
  schedule:
    - cron: "0 11 * * *"    # 7:00 AM EST - morning scrape
    - cron: "0 17 * * *"    # 1:00 PM EST - afternoon scrape
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fpl-vortex-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      BOT_PAUSED: ${{ vars.BOT_PAUSED }}

    steps:
      - name: Pause Check (Kill Switch)
        run: |
          echo "BOT_PAUSED=$BOT_PAUSED"
          if [ "$BOT_PAUSED" = "true" ]; then
            echo "BOT IS PAUSED - EXITING JOB"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Run bot
        id: run
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0_TOKEN: ${{ secrets.X_CT0_TOKEN }}
          X_POST_AUTH_TOKEN: ${{ secrets.X_POST_AUTH_TOKEN }}
          X_POST_CT0_TOKEN: ${{ secrets.X_POST_CT0_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
        run: |
          set +e
          python main.py
          code=$?
          if [ $code -ne 0 ]; then
            echo "First attempt failed (exit $code) — retrying once after 30s"
            sleep 30
            python main.py
            code=$?
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code

      - name: Persist state (dedup, daily count, deferred queue)
        if: always()
        run: |
          git config user.name "fpl-vortex-bot"
          git config user.email "bot@users.noreply.github.com"
          git add posted_news.json fpl_player_state.json 2>/dev/null || true
          git add queue/ 2>/dev/null || true
          git add fpl_drafts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "update bot state [skip ci]"
            git push
          fi
