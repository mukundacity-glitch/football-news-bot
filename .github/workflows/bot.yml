name: FPL Vortex Bot

on:
  schedule:
    - cron: "0 5 * * *"     # 1:00 AM EST
    - cron: "0 8 * * *"     # 4:00 AM EST
    - cron: "0 11 * * *"    # 7:00 AM EST
    - cron: "0 14 * * *"    # 10:00 AM EST
    - cron: "0 17 * * *"    # 1:00 PM EST
    - cron: "0 20 * * *"    # 4:00 PM EST
    - cron: "0 23 * * *"    # 7:00 PM EST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fpl-vortex-bot
  cancel-in-progress: false
jobs:
  run-bot:
    runs-on: ubuntu-latest

    env:
      BOT_PAUSED: ${{ vars.BOT_PAUSED }}

    steps:
      - name: Pause Check (Kill Switch)
        run: |
          echo "BOT_PAUSED=$BOT_PAUSED"
          if [ "$BOT_PAUSED" = "true" ]; then
            echo "BOT IS PAUSED - EXITING JOB"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Run bot
        id: run
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0_TOKEN: ${{ secrets.X_CT0_TOKEN }}
          X_POST_AUTH_TOKEN: ${{ secrets.X_POST_AUTH_TOKEN }}
          X_POST_CT0_TOKEN: ${{ secrets.X_POST_CT0_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Live posting is OPT-IN. Set repo Variable ENABLE_AUTOPOST=true to post
          # to X; leave unset/empty to stay in safe draft-only mode. Optional
          # overrides (MAX_POSTS_PER_RUN, MAX_POSTS_PER_HOUR, DAILY_POST_LIMIT,
          # POST_JITTER_MIN_S, POST_JITTER_MAX_S) can also be set as Variables.
          ENABLE_AUTOPOST: ${{ vars.ENABLE_AUTOPOST }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN }}
          MAX_POSTS_PER_HOUR: ${{ vars.MAX_POSTS_PER_HOUR }}
          DAILY_POST_LIMIT: ${{ vars.DAILY_POST_LIMIT }}

        run: |
          set +e
          python main.py --allow-rumours
          code=$?
          if [ $code -ne 0 ]; then
            echo "First attempt failed (exit $code) — retrying once after 30s"
            sleep 30
            python main.py --allow-rumours
            code=$?
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code

      - name: Persist state (dedup, daily count, deferred queue)
        if: always()
        run: |
          git config user.name "fpl-vortex-bot"
          git config user.email "bot@users.noreply.github.com"
          # data/posted_news.json is the dedup + daily-count + cooldown ledger.
          # It MUST be persisted every run or the bot forgets what it already
          # posted and re-posts the same news. (Old paths kept for compatibility.)
          git add data/posted_news.json 2>/dev/null || true
          git add posted_news.json fpl_player_state.json 2>/dev/null || true
          git add queue/ 2>/dev/null || true
          git add fpl_drafts/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "update bot state [skip ci]"
            # Rebase-then-push with retries so a concurrent push to main (e.g. a
            # merge landing mid-run) can't fail the job. Keep OUR bot-state files
            # on conflict — they are the freshest dedup/queue snapshot.
            pushed=""
            for i in 1 2 3 4 5; do
              if git push; then pushed=1; break; fi
              echo "push rejected (attempt $i) — rebasing on origin/main and retrying"
              git pull --rebase --autostash -X ours origin main || git rebase --abort || true
              sleep 3
            done
            if [ -z "$pushed" ]; then
              echo "WARNING: could not push bot state after retries; will re-attempt next run."
            fi
          fi
