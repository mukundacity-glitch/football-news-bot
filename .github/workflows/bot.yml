name: fpl-vortex-bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: fpl-vortex-bot
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: |
            posted_news.json
            fpl_cache.json
            logos
            players
          key: fpl-vortex-state-${{ github.run_id }}
          restore-keys: |
            fpl-vortex-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot (with one retry)
        id: run
        env:
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0_TOKEN: ${{ secrets.X_CT0_TOKEN }}
          X_POST_AUTH_TOKEN: ${{ secrets.X_POST_AUTH_TOKEN }}
          X_POST_CT0_TOKEN: ${{ secrets.X_POST_CT0_TOKEN }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          python main.py
          code=$?
          if [ $code -ne 0 ]; then
            echo "First attempt failed (exit $code) — retrying once after 30s"
            sleep 30
            python main.py
            code=$?
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit $code

      - name: Save bot state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            posted_news.json
            fpl_cache.json
            logos
            players
          key: fpl-vortex-state-${{ github.run_id }}

      - name: Open failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ FPL Vortex bot run failed";
            const body = [
              `Run failed at ${new Date().toISOString()}.`,
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Common causes (check the run log):",
              "- X cookies expired → refresh X_AUTH_TOKEN / X_CT0_TOKEN / X_POST_* secrets",
              "- All Nitter instances down → reads return nothing",
              "- GEMINI_API_KEY missing/quota → bot still runs on regex fallback",
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "bot-failure",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["bot-failure"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            }