name: Run FPL Vortex Bot Daily

on:
  schedule:
    # 13:00 UTC is exactly 9:00 AM Eastern Time (US)
    - cron: '0 13 * * *'
  workflow_dispatch: # This button lets us start it manually right now!

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install twikit pillow pilmoji google-generativeai requests

    - name: Run Bot with Auto-Post
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
        X_CT0_TOKEN: ${{ secrets.X_CT0_TOKEN }}
      run: |
        python main.py --post
